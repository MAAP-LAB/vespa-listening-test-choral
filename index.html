let idx=0, ratings={}, order={};
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
for(const it of CFG.items){order[it.id]=shuffle(it.rate);ratings[it.id]={};}
function render(){
 const it=CFG.items[idx], app=document.getElementById('app');
 document.getElementById('pos').textContent=`Item ${idx+1} / ${CFG.items.length}`;
 let h=`<div class="item"><div class="ref"><b>Reference</b> (${it.voice_count} voices)<br><audio controls preload="auto" src="items/${it.id}/${it.reference}.wav"></audio></div>`;
 order[it.id].forEach((cond,i)=>{
  const label=String.fromCharCode(65+i), v=ratings[it.id][cond]??50;
  h+=`<div class="cond"><b>${label}</b><audio controls preload="auto" src="items/${it.id}/${cond}.wav"></audio>
      <input type="range" min="0" max="100" value="${v}" oninput="setv('${it.id}','${cond}',this.value,${i})">
      <span class="val" id="v_${i}">${v}</span></div>`;
 });
 app.innerHTML=h+`</div>`;
}
function setv(item,cond,val,i){ratings[item][cond]=+val;const e=document.getElementById('v_'+i);if(e)e.textContent=val;}
document.getElementById('prev').onclick=()=>{if(idx>0){idx--;render();}};
document.getElementById('next').onclick=()=>{if(idx<CFG.items.length-1){idx++;render();}};
document.getElementById('export').onclick=()=>{
 const rid=document.getElementById('rid').value||('rater_'+Math.floor(Math.random()*1e6));
 const blob=new Blob([JSON.stringify({rater:rid,timestamp:new Date().toISOString(),ratings},null,2)],{type:"application/json"});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`mushra_acappella_dagst_${rid}.json`;a.click();
};
document.getElementById('status').textContent=`(${CFG.items.length} items loaded)`;
render();
